<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(135deg,#0f172a,#111827,#000);color:#fff}.container{padding:30px;max-width:1400px;margin:auto}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;padding:20px 25px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:20px;backdrop-filter:blur(10px)}.header h1{margin:0;font-size:30px}.header p{margin:5px 0 0;color:#cbd5e1}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-bottom:25px}.card{background:rgba(255,255,255,.08);padding:22px;border-radius:20px;border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 25px rgba(0,0,0,.25)}.card h3{margin:0 0 12px;font-size:15px;color:#cbd5e1;text-transform:uppercase;letter-spacing:1px}.card .num{font-size:34px;font-weight:700}.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:20px}.chart-box{background:rgba(255,255,255,.08);padding:22px;border-radius:20px;border:1px solid rgba(255,255,255,.08);box-shadow:0 10px 25px rgba(0,0,0,.25)}.chart-box h3{margin-top:0;margin-bottom:15px;color:#e2e8f0}canvas{max-height:320px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<div><h1>Admin Dashboard</h1><p>Management Overview & Performance Analytics</p></div>
<div>📊</div>
</div>
<div class="cards">
<div class="card"><h3>Total User</h3><div class="num">1,250</div></div>
<div class="card"><h3>Total State</h3><div class="num">14</div></div>
<div class="card"><h3>Total Staff</h3><div class="num">320</div></div>
</div>
<div class="charts">
<div class="chart-box"><h3>Users by State</h3><canvas id="bar1"></canvas></div>
<div class="chart-box"><h3>Monthly Growth</h3><canvas id="line1"></canvas></div>
<div class="chart-box"><h3>Staff by Department</h3><canvas id="bar2"></canvas></div>
</div>
</div>
<script>
new Chart(document.getElementById('bar1'),{type:'bar',data:{labels:['Selangor','Johor','Perak','Sabah','Penang'],datasets:[{label:'Users',data:[320,250,180,140,210],backgroundColor:'rgba(54,162,235,.7)'}]}});
new Chart(document.getElementById('line1'),{type:'line',data:{labels:['Jan','Feb','Mar','Apr','May','Jun'],datasets:[{label:'Users',data:[100,180,250,300,420,500],borderColor:'rgba(75,192,192,1)',fill:false,tension:.3}]}});
new Chart(document.getElementById('bar2'),{type:'bar',data:{labels:['HR','IT','Finance','Ops','Admin'],datasets:[{label:'Staff',data:[40,90,55,75,60],backgroundColor:'rgba(255,99,132,.7)'}]}});
</script>
</body>
</html>
