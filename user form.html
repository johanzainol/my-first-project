<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
            background: #f3f4f6;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 240px;
            position: fixed;
            top: 0;
            left: 0;
            background: #111827;
            padding-top: 20px;
        }

        .sidebar-title {
            color: white;
            text-align: center;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            padding: 12px 18px;
            text-decoration: none;
            font-size: 14px;
        }

        .sidebar a:hover {
            background: #374151;
        }

        /* Content */
        .content {
            margin-left: 240px;
            padding: 25px;
        }

        /* Smaller form */
        .form-card {
            max-width: 550px;
            margin: auto;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-title">Admin Panel</div>

    <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="#"><i class="bi bi-people"></i> User Management</a>
    <a href="#"><i class="bi bi-bar-chart"></i> Reports</a>
    <a href="#"><i class="bi bi-gear"></i> Settings</a>
    <a href="#"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- Content -->
<div class="content">

    <h4 class="mb-4">Create User</h4>

    <!-- Small centered form -->
    <div class="card shadow-sm form-card">
        <div class="card-body">

            <form>

                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control form-control-sm" placeholder="Enter full name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control form-control-sm" placeholder="Enter email">
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control form-control-sm" placeholder="Enter password">
                </div>

                <div class="mb-3">
                    <label class="form-label">Role</label>
                    <select class="form-select form-select-sm">
                        <option>Admin</option>
                        <option>User</option>
                        <option>Staff</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select form-select-sm">
                        <option>Active</option>
                        <option>Inactive</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-sm w-100">
                    Save User
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
